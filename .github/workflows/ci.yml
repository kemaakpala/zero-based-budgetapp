name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run formatting check
        run: npx prettier --check .

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run audit
        run: npm audit --audit-level=critical

      - name: Run build
        run: npm run build
